<body>
    
    <div class="video-background">
        <video id="bg-video" autoplay muted loop playsinline>
            
            <source src="backgrvideo4.mp4" type="video/mp4">
            
            <img src="https://www.htmlhints.com/image/other/encryptDecrypt.jpeg" alt="Fallback image">
        </video>
        <div class="video-overlay"></div>
    </div>

   <div class ='content'> 

<form id="encryption">  

<input type ='text' class ='input' name='info' placeholder="Type the word you'd like to decrypt">

<button type ='submit'> Confirm
</button>
<br> <input type="text" id="resultField" class="input" placeholder="" disabled>
</form>

   </div>
<script> 
let element = document.querySelector('input'); 

const colors = ['red', 'blue', 'green', 'purple', 'orange'];
let colorIndex = 0;

document.body.addEventListener('input', function(e) {
    colorIndex = (colorIndex + 1) % colors.length;
    element.style.color = colors[colorIndex];
});


function caesarCipher(text, shift) {
    let result = '';
    
    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        
        
        if (char.match(/[a-z]/i)) {
           
            let code = text.charCodeAt(i);
            
            
            if (code >= 65 && code <= 90) {
                char = String.fromCharCode(((code - 65 + shift) % 26) + 65);
            }
            
            else if (code >= 97 && code <= 122) {
                char = String.fromCharCode(((code - 97 + shift) % 26) + 97);
            }
        }
        
        result += char;
    }
    
    return result;
}

const form = document.forms.encryption;

form.addEventListener("submit", function(e) { 
    e.preventDefault();
    
    let inputField = document.querySelector('input[name="info"]');
    let resultField = document.getElementById('resultField');
    
    
    let encryptedText = caesarCipher(inputField.value, -3);
    
    

    resultField.value = encryptedText;

    resultField.style.color = '#96E396';




   
});
</script>
