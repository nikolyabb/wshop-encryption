<body>
    
   <div class="img-background">
       
            
            <img src="backgr.jpg" alt="Fallback image">
      
    </div>

     <div class ='content'> 

<form id="decryption">  

    <input 
                type="range"
                id="int-range"  
                name="info1"
                min="-4"
                max="4"
                step="1"
                value="0"
            >
            <output id="int-range-output" class="instruction">0</output>
          
<input type ='text' class ='input' name='info' placeholder="Type the word you'd like to decrypt" autocomplete="off">


<br> <input type="text" id="resultField" class="input" placeholder="" disabled autocomplete="off">

<div class="spacer"></div>

<button type ='submit'> Confirm

</button>

</form>

   </body>
<script>
let element = document.querySelector('input[type="text"]');

const colors = ['red', 'blue', 'green', 'purple', 'orange'];
let colorIndex = 0;

document.body.addEventListener('input', function(e) {
    colorIndex = (colorIndex + 1) % colors.length;
    element.style.color = colors[colorIndex];
});

const params = new URLSearchParams(window.location.search);
const shiftFromUrl = parseInt(params.get('shift'), 10) || 0;

const slider = document.getElementById('int-range');
const out = document.getElementById('int-range-output');

if (slider) {
    slider.value = shiftFromUrl;
    out.textContent = shiftFromUrl;
    
    slider.addEventListener('input', () => {
        out.textContent = slider.value;
    });
}

function caesarCipher(text, shift) {
    let result = '';
    shift = ((shift % 26) + 26) % 26;
    
    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        
        if (char.match(/[a-z]/i)) {
            let code = text.charCodeAt(i);
            
            if (code >= 65 && code <= 90) {
                char = String.fromCharCode(((code - 65 + shift) % 26) + 65);
            }
            else if (code >= 97 && code <= 122) {
                char = String.fromCharCode(((code - 97 + shift) % 26) + 97);
            }
        }
        
        result += char;
    }
    
    return result;
}

const form = document.forms.decryption;

form.addEventListener("submit", function(e) { 
    e.preventDefault();
    
    let inputField = document.querySelector('input[name="info"]');
    let resultField = document.getElementById('resultField');
    let decryptedText = caesarCipher(inputField.value, -slider.value);
    resultField.value = decryptedText;
});
</script>
