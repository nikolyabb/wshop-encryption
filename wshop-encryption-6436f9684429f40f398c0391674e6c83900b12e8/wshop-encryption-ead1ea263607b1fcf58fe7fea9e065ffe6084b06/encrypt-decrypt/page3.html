<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decrypting</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="new.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playwrite+IN+Guides&display=swap" rel="stylesheet">
    <style> 

    .input::placeholder {
    color: #a72188;  
         
}
       
#encryption input {
    width: 367px; 
    padding: 15px;
    font-size: 18px;
}

        .input {
            border-radius: 5px;
            background-color:transparent;
            color:#a72188; 
        }

      .instruction {
    display: flex;
    justify-content: center;
    color: #a72188; 
    margin-left: 2%;
    position: relative;  
    z-index: 10;         
    padding: 10px;      
}
      
    </style>
<body>
    
   <div class="img-background">
       
            
            <img src="backgr.jpg" alt="Fallback image">
      
    </div>

     <div class ='content'> 

<form id="encryption">  

    <input 
                type="range"
                id="int-range"  
                name="info1"
                min="-4"
                max="4"
                step="1"
                value="0"
            >
            <output id="int-range-output" class="instruction">0</output>
          
<input type ='text' class ='input' name='info' placeholder="Type the word you'd like to decrypt" autocomplete="off">

<button type ='submit'> Confirm
</button>
<br> <input type="text" id="resultField" class="input" placeholder="" disabled autocomplete="off">
</form>

   </div>
    
   </body>
<script>

const params = new URLSearchParams(window.location.search);
const shiftFromUrl = parseInt(params.get('shift'), 10) || 0;

const slider = document.getElementById('int-range');
const out = document.getElementById('int-range-output');

if (slider) {
    slider.value = shiftFromUrl;
    out.textContent = shiftFromUrl;
    
    slider.addEventListener('input', () => {
        out.textContent = slider.value;
    });
}

function caesarCipher(text, shift) {
    let result = '';
    shift = ((shift % 26) + 26) % 26;
    
    for (let i = 0; i < text.length; i++) {
        let char = text[i];
        
        if (char.match(/[a-z]/i)) {
            let code = text.charCodeAt(i);
            
            if (code >= 65 && code <= 90) {
                char = String.fromCharCode(((code - 65 + shift) % 26) + 65);
            }
            else if (code >= 97 && code <= 122) {
                char = String.fromCharCode(((code - 97 + shift) % 26) + 97);
            }
        }
        
        result += char;
    }
    
    return result;
}

const form = document.forms.encryption;

form.addEventListener("submit", function(e) { 
    e.preventDefault();
    
    let inputField = document.querySelector('input[name="info"]');
    let resultField = document.getElementById('resultField');
    let decryptedText = caesarCipher(inputField.value, -shiftFromUrl);
    resultField.value = decryptedText;
});
</script>
