    <!-- Кликабельное изображение -->
    <img id="clickable-image" src="img/Yggdrasil.png" alt="Yggdrasil Map" usemap="#image-map">
    <map name="image-map">
        <!-- Здесь будут области -->
    </map>

    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const image = document.getElementById('clickable-image');
            const map = document.querySelector('map[name="image-map"]');
            
           
            const areas = [
                { 
                    name: 'ASGARD',
                    coords: [272, 265, 379, 289], // x1,y1,x2,y2
                    url: 'asgardru.html'
                },
                { 
                    name: 'MIDGARD',
                    coords: [200, 401, 325, 423],
                    url: 'midgardru.html'
                },
                { 
                    name: 'MUSPELHEIM',
                    coords: [404, 351, 539, 387],
                    url: 'muspelheimru.html'
                },
                { 
                    name: 'VANAHEIM',
                    coords: [10, 489, 116, 515],
                    url: 'vanaheimru.html'
                },
                { 
                    name: 'HELHEIM',
                    coords: [401, 591, 521, 630],
                    url: 'helheimru.html'
                },

                {
                    name : 'JOTUNHEIM',
                    coords:[11, 621, 136, 648],
                    url: 'jotunheimru.html'
                },

                {
                    name: 'ALFHEIM',
                    coords:[20, 375, 142, 401],
                    url: 'alfheimru.html'
                },

                {
                   name: 'NIFLHEIM',
                   coords:[272, 639, 389, 674],
                   url: 'niflheimru.html'
                },

                {
                  name: 'NIDAVELLIR',
                  coords:[435, 496, 542, 523],
                  url: 'nidavellirru.html'
                }
            ];

            // Создаем области на карте
            areas.forEach(area => {
                const areaElement = document.createElement('area');
                areaElement.shape = 'rect';
                areaElement.coords = area.coords.join(',');
                areaElement.alt = area.name;
                areaElement.href = area.url;
                map.appendChild(areaElement);
            });
            
            console.log('Карта миров Yggdrasil активирована!');

            image.addEventListener('click', function(event) {
                // 1. Получаем положение изображения на странице
                const rect = image.getBoundingClientRect();
                
                // 2. Вычисляем координаты клика ОТНОСИТЕЛЬНО изображения
                const x = Math.round(event.clientX - rect.left);
                const y = Math.round(event.clientY - rect.top);
                
                // 3. Показываем результат
                console.log(`Координаты: x=${x}, y=${y}`);
            }); 
            
           
        }); 

        document.getElementById('language').addEventListener('change', function() 
{
const selectedLanguage = this.value;

if (selectedLanguage && selectedLanguage !== '') 
{
    window.location.href = selectedLanguage;
}
})
