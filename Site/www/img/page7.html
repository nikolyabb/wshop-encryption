<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дешифровщики - Page 7</title>
    <style>
        body {
            background: #0a0a0a;
            color: #96E396;
            font-family: 'Inter', monospace;
            padding: 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #96E396;
            text-shadow: 0 0 10px #96E396;
        }
        .task-box {
            border: 2px solid #96E396;
            border-radius: 10px;
            padding: 30px;
            margin: 20px 0;
            background: rgba(150, 227, 150, 0.05);
        }
        .label {
            color: #888;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .value {
            color: #96E396;
            font-size: 28px;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            word-break: break-all;
        }
        .topic-value {
            color: #fff;
            font-size: 24px;
        }
        .status {
            padding: 15px;
            border: 2px solid;
            border-radius: 5px;
            margin: 20px 0;
            text-align: center;
        }
        .status.connected {
            border-color: #96E396;
            color: #96E396;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔓 ДЕШИФРОВЩИКИ (PAGE 7)</h1>
        
        <div id="status" class="status">⏳ Подключение...</div>
        
        <div class="task-box">
            <div class="label">📌 ТЕМА:</div>
            <div class="value topic-value" id="topic">---</div>
            
            <div class="label">🔒 ЗАШИФРОВАНО:</div>
            <div class="value" id="encrypted">---</div>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const topicDiv = document.getElementById('topic');
        const encryptedDiv = document.getElementById('encrypted');
        
        const ws = new WebSocket('ws://localhost:3000');
        
        ws.onopen = () => {
            statusDiv.innerHTML = '✅ ПОДКЛЮЧЕНО К СЕРВЕРУ';
            statusDiv.className = 'status connected';
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            console.log('Получено:', data);
            
            if (data.type === 'current_task' || data.type === 'new_task') {
                topicDiv.innerHTML = data.topic;
                encryptedDiv.innerHTML = data.encrypted;
            }
        };
        
        ws.onclose = () => {
            statusDiv.innerHTML = '❌ ОТКЛЮЧЕНО';
        };
    </script>
</body>
</html>
